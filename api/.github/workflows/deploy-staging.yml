name: Deploy to staging
on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, staging]
    steps:
      - uses: actions/checkout@v4
      - name: Sync to /opt/astrapbx
        run: |
          rsync -a --delete \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.github \
            --exclude=.env \
            --exclude=google-credentials.json \
            --exclude='*.log' \
            --exclude=audio \
            --exclude=logs \
            --exclude=tmp \
            --exclude=dist \
            . /opt/astrapbx/
      - name: Install deps
        working-directory: /opt/astrapbx
        run: npm ci --omit=dev
      - name: Reload PM2
        run: pm2 reload astrapbx --update-env
      - name: Health check
        run: |
          sleep 2
          curl -fsS http://127.0.0.1:8000/health | tee /dev/stderr
