          type: boolean

    LoggingConfig:
      type: object
      properties:
        console_level:
          type: string
        syslog_level:
          type: string
        cdr_enabled:
          type: boolean
        cel_enabled:
          type: boolean
        queue_log_enabled:
          type: boolean

    FeaturesConfig:
      type: object
      properties:
        enable_call_parking:
          type: boolean
        enable_call_pickup:
          type: boolean
        enable_call_transfer:
          type: boolean
        enable_call_waiting:
          type: boolean
        enable_caller_id:
          type: boolean
        enable_do_not_disturb:
          type: boolean
paths:
  # Authentication
  /auth/login:
    post:
      tags: [Authentication]
      summary: Generate JWT token (Organization authentication)
      description: |
        Authenticate organization using API key and secret to receive JWT token for API access.

        **Authentication Flow:**
        1. Get organization API credentials using admin endpoints
        2. Use these credentials to authenticate and receive JWT token
        3. Use JWT token for all subsequent API calls

        **Example curl:**
        ```bash
        curl -X POST ${YOUR_SERVER_URL}/api/v1/auth/login \
          -H "Content-Type: application/json" \
          -d '{
            "api_key": "YOUR_ORG_API_KEY",
            "api_secret": "YOUR_ORG_API_SECRET"
          }'
        ```
      security: []  # No authentication required for login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key, api_secret]
              properties:
                api_key:
                  type: string
                  description: Organization API key
                  example: "YOUR_ORG_API_KEY"
                api_secret:
                  type: string
                  description: Organization API secret (plain text)
                  example: "YOUR_ORG_API_SECRET"
            example:
              api_key: "YOUR_ORG_API_KEY"
              api_secret: "YOUR_ORG_API_SECRET"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  token:
                    type: string
                    description: JWT token for API authentication
                  expires_in:
                    type: integer
                    description: Token expiration time in seconds (86400 for 24 hours)
                  organization:
                    $ref: '#/components/schemas/Organization'
              example:
                success: true
                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                expires_in: 86400
                organization:
                  id: "2c662bff-8f80-483a-8235-74fd48965a9c"
                  name: "TestOrg"
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: "Invalid API key or secret"

  /admin/auth:
    post:
      tags: [Admin Authentication]
      summary: Admin authentication
      description: |
        Authenticate as system administrator using credentials from environment variables.
        This endpoint provides access to administrative functions like managing organizations
        and retrieving organization credentials.

        **Required Environment Variables:**
        - `ADMIN_USERNAME`: System admin username
        - `ADMIN_PASSWORD`: System admin password

        **Example curl:**
        ```bash
        curl -X POST ${YOUR_SERVER_URL}/api/v1/admin/auth \
          -H "Content-Type: application/json" \
          -d '{
            "admin_username": "pbx_admin",
            "admin_password": "YOUR_ADMIN_PASSWORD"
          }'
        ```
      security: []  # No authentication required for admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [admin_username, admin_password]
              properties:
                admin_username:
                  type: string
                  description: Admin username from environment variables
                  example: "pbx_admin"
                admin_password:
                  type: string
                  description: Admin password from environment variables
                  example: "YOUR_ADMIN_PASSWORD"
            example:
              admin_username: "pbx_admin"
              admin_password: "YOUR_ADMIN_PASSWORD"
      responses:
        '200':
          description: Admin authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  token:
                    type: string
                    description: JWT token with admin privileges
                  expires_in:
                    type: integer
                    description: Token expiration time in seconds (86400 for 24 hours)
                  message:
                    type: string
              example:
                success: true
                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                expires_in: 86400
                message: "Admin authenticated successfully"
        '401':
          description: Invalid admin credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: "Invalid admin credentials"
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  required_fields:
                    type: array
                    items:
                      type: string
              example:
                error: "Admin credentials required"
                required_fields: ["admin_username", "admin_password"]

  /admin/organizations/{organizationId}/credentials:
    get:
      tags: [Admin Authentication]
      summary: Get organization API credentials
      description: |
        Retrieve organization API credentials with fresh plain text API secret.
        This endpoint generates a new plain text API secret for the organization,
        replacing the previous one. Use the returned credentials for organization authentication.

        **Authentication:** Requires admin JWT token from `/admin/auth` endpoint.

        **Important:** The returned `api_secret_plaintext` should be used for organization authentication,
        not the hashed version.

        **Example curl:**
        ```bash
        curl -X GET ${YOUR_SERVER_URL}/api/v1/admin/organizations/2c662bff-8f80-483a-8235-74fd48965a9c/credentials \
          -H "Authorization: Bearer YOUR_ADMIN_TOKEN"
        ```
      security:
        - BearerAuth: []
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Organization UUID
          example: "2c662bff-8f80-483a-8235-74fd48965a9c"
      responses:
        '200':
          description: Organization credentials retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  api_key:
                    type: string
                    description: Organization API key for authentication
                  api_secret_plaintext:
                    type: string
                    description: Plain text API secret (use this for authentication)
                  api_secret_hash:
                    type: string
                    description: Hashed version stored in database (for reference only)
                  note:
                    type: string
                    description: Usage instructions
              example:
                id: "2c662bff-8f80-483a-8235-74fd48965a9c"
                name: "TestOrg"
                api_key: "YOUR_ORG_API_KEY"
                api_secret_plaintext: "secret_testorg7h8k2m"
                api_secret_hash: "$2b$10$Xy7uV3mNqP2rS8tK5wQ6J..."
                note: "Fresh API secret generated. Use api_secret_plaintext for API calls."
        '401':
          description: Unauthorized - Invalid or missing admin token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: "Admin authentication required"
        '404':
          description: Organization not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: "Organization not found"

  /admin/organizations:
    get:
      security:
        - BearerAuth: []
      tags: [Admin Authentication]
      summary: List all organizations (Admin only)
      description: |
        Retrieve a list of all organizations in the system.

        **Authentication:** Requires admin JWT token from `/admin/auth` endpoint.

        This endpoint is for admin use only and returns all organizations regardless of which admin token is used.

        **Example curl:**
        ```bash
        curl -X GET ${YOUR_SERVER_URL}/api/v1/admin/organizations \
          -H "Authorization: Bearer YOUR_ADMIN_TOKEN"
        ```
      responses:
        '200':
          description: List of all organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Organization'
              example:
                - id: "2c662bff-8f80-483a-8235-74fd48965a9c"
                  name: "TestOrg"
                  domain: "testorg.local"
                  context_prefix: "testorg_"
                  status: "active"
                  settings:
                    max_trunks: 5
                    max_dids: 10
                    features:
                      ai_agent: false
                  createdAt: "2025-09-17T17:28:10.899Z"
                - id: "3d773c0f-493d-4061-b3f3-4d42134234g2"
                  name: "AnotherOrg"
                  domain: "anotherorg.local"
                  context_prefix: "anotherorg_"
                  status: "active"
                  settings:
                    max_trunks: 10
                    max_dids: 20
                    features:
                      ai_agent: true
                  createdAt: "2025-09-18T10:15:22.123Z"
        '401':
          description: Unauthorized - Invalid or missing admin token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: "Admin authentication required"

  # Configuration Management
  /config/verify:
    get:
      tags: [Configuration Management]
      summary: Verify organization configuration
      description: |
        Comprehensive verification of organization's Asterisk configuration including PJSIP, dialplan, queues, and helper functions

        **Example curl:**
        ```bash
        curl -X GET ${YOUR_SERVER_URL}/api/v1/config/verify \
          -H "Authorization: Bearer YOUR_ORG_TOKEN"
        ```
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Verification completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigurationVerificationResult'
              example:
                organization:
                  id: "2c662bff-8f80-483a-8235-74fd48965a9c"
                  name: "TestOrg"
                timestamp: "2025-09-17T16:28:04.028Z"
                overall_status: "SUCCESS"
                checks:
                  file_existence:
                    status: "PASS"
                    message: "All configuration files exist"
                  pjsip_config:
                    status: "PASS"
                    message: "4 PJSIP endpoints loaded successfully"
                  dialplan_config:
                    status: "PASS"
                    message: "17 helper functions available"

  /config/deploy:
    post:
      tags: [Configuration Management]
      summary: Deploy organization configuration
      description: |
        Deploy and reload organization configuration to Asterisk using AMI 'core reload' command.

        **Important:** Uses `core reload` instead of module-specific reloads to avoid dropping active calls.

        **Example curl:**
        ```bash
        curl -X POST http://localhost:3000/api/v1/config/deploy \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"reload": true}'
        ```
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reload:
                  type: boolean
                  default: true
                  description: Whether to reload Asterisk after deployment (default true)
      responses:
        '200':
          description: Configuration deployed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  deployment:
                    type: object
                    description: Deployment result details
                  reload:
                    type: object
                    properties:
                      success:
                        type: boolean
                      method:
                        type: string
                        example: "AMI"
                      action:
                        type: string
                        example: "core reload"
                      message:
                        type: string
                        example: "Asterisk configuration reloaded successfully without dropping calls"
              example:
                success: true
                deployment:
                  files_written: 5
                  organization: "mytest"
                reload:
                  success: true
                  method: "AMI"
                  action: "core reload"
                  message: "Asterisk configuration reloaded successfully without dropping calls"

  /config/test-helpers:
    get:
      tags: [Configuration Management]
      summary: Test helper functions
      description: |
        Test all dialplan helper functions for the organization

        **Example curl:**
        ```bash
        curl -X GET ${YOUR_SERVER_URL}/api/v1/config/test-helpers \
          -H "Authorization: Bearer YOUR_ORG_TOKEN"
        ```
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Helper function test results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  organization:
                    type: object
                  helper_functions:
                    type: array
                    items:
                      $ref: '#/components/schemas/HelperFunctionTest'

  /config/report:
    get:
      security:
        - BearerAuth: []
      tags: [Configuration Management]
      summary: Generate verification report
      description: |
        Generate detailed verification report in Markdown format

        **Example curl:**
        ```bash
        curl -X GET ${YOUR_SERVER_URL}/api/v1/config/report \
          -H "Authorization: Bearer YOUR_ORG_TOKEN"
        ```
      produces:
        - text/markdown
      responses:
        '200':
          description: Verification report in Markdown format
          content:
            text/markdown:
              schema:
                type: string

  /config/list:
    get:
      security:
        - BearerAuth: []
      tags: [Configuration Management]
      summary: List organization configurations
      description: |
        List all configuration files for the organization

        **Example curl:**
        ```bash
        curl -X GET ${YOUR_SERVER_URL}/api/v1/config/list \
          -H "Authorization: Bearer YOUR_ORG_TOKEN"
        ```
      responses:
        '200':
          description: Configuration file list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  configurations:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                        path:
                          type: string
                        exists:
                          type: boolean
                        size:
                          type: integer

  /config/reload:
    post:
      security:
        - BearerAuth: []
      tags: [Configuration Management]
      summary: Reload Asterisk configuration via AMI
      description: |
        Reload Asterisk configuration using AMI 'core reload' command without dropping active calls.

        **Important:** Uses `core reload` to safely reload configuration without affecting active calls.

        **Note:** No request body required. This endpoint uses AMI to execute the core reload command.
      responses:
        '200':
          description: Configuration reloaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  method:
                    type: string
                    example: "AMI"
                  action:
                    type: string
                    example: "core reload"
                  message:
                    type: string
                    example: "Asterisk configuration reloaded successfully without dropping calls"
              example:
                success: true
                method: "AMI"
                action: "core reload"
                message: "Asterisk configuration reloaded successfully without dropping calls"

  # Organization Management
  /organizations:
    get:
      security:
        - BearerAuth: []
      tags: [Organization Management]
      summary: List all organizations
      description: |
        Get all organizations for the authenticated organization (returns only the organization that owns the token)

        **Example curl:**
        ```bash
        curl -X GET ${YOUR_SERVER_URL}/api/v1/organizations \
          -H "Authorization: Bearer YOUR_ORG_TOKEN"
        ```
      responses:
        '200':
          description: List of organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Organization'
        '401':
          description: Unauthorized - Invalid or missing token
    post:
      tags: [Organization Management]
      summary: Create new organization
      description: |
        Create a new organization with admin authentication required. Supports full configuration including settings, limits, and features.

        **Example curl:**
        ```bash
        curl -X POST ${YOUR_SERVER_URL}/api/v1/organizations \
          -H "Content-Type: application/json" \
          -d '{
            "name": "SecureTestCompany",
            "admin_username": "pbx_admin",
            "admin_password": "YOUR_ADMIN_PASSWORD",
            "settings": {
              "max_trunks": 10,
              "max_users": 100,
              "features": {
                "ai_agent": true
              }
            },
            "limits": {
              "concurrent_calls": 50,
              "monthly_minutes": 50000
            },
            "contact_info": {
              "email": "admin@testcompany.com",
              "phone": "+1-555-0123"
            }
          }'
        ```
      security: []  # No API key required, uses admin credentials instead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, admin_username, admin_password]
              properties:
                name:
                  type: string
                  description: |
                    Organization name - used to generate context prefix for multi-tenant isolation.

                    **Validation Rules:**
                    - Must be 3-50 characters long
                    - Cannot contain spaces
                    - Cannot start or end with special characters
                    - Only alphanumeric characters and hyphens allowed
                    - Must start and end with alphanumeric characters

                    **Examples:**
                    - Valid: "MyCompany", "ACME-Corp", "TestOrg123"
                    - Invalid: "My Company" (spaces), "-ACME" (starts with special char), "Test!" (special char)
                  pattern: '^[a-zA-Z0-9][a-zA-Z0-9-]*[a-zA-Z0-9]$|^[a-zA-Z0-9]$'
                  minLength: 3
                  maxLength: 50
                  example: "TestOrg"
                domain:
                  type: string
                  description: Organization domain (auto-generated from name if not provided)
                  example: "testorg.local"
                status:
                  type: string
                  enum: [active, suspended, deleted]
                  default: active
                admin_username:
                  type: string
                  description: Admin username from environment variables
                  example: "pbx_admin"
                admin_password:
                  type: string
                  description: Admin password from environment variables
                  example: "YOUR_ADMIN_PASSWORD"
                settings:
                  type: object
                  description: Organization settings including resource limits and feature flags
                  properties:
                    max_trunks:
                      type: integer
                      default: 5
                    max_dids:
                      type: integer
                      default: 10
                    max_users:
                      type: integer
                      default: 50
                    max_queues:
                      type: integer
                      default: 10
                    recording_enabled:
                      type: boolean
                      default: false
                    webhook_enabled:
                      type: boolean
                      default: true
                    features:
                      type: object
                      properties:
                        call_transfer:
                          type: boolean
                          default: true
                        call_recording:
                          type: boolean
                          default: true
                        voicemail:
                          type: boolean
                          default: true
                        conference:
                          type: boolean
                          default: true
                        ivr:
                          type: boolean
                          default: true
                        ai_agent:
                          type: boolean
                          default: false
                limits:
                  type: object
                  description: Organization resource limits
                  properties:
                    concurrent_calls:
                      type: integer
                      default: 10
                    monthly_minutes:
                      type: integer
                      default: 10000
                    storage_gb:
                      type: integer
                      default: 10
                contact_info:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                    phone:
                      type: string
                    address:
                      type: string
              example:
                name: "SecureTestCompany"
                admin_username: "pbx_admin"
                admin_password: "YOUR_ADMIN_PASSWORD"
                settings:
                  max_trunks: 10
                  max_users: 100
                  features:
                    ai_agent: true
                limits:
                  concurrent_calls: 50
                  monthly_minutes: 50000
                contact_info:
                  email: "admin@testcompany.com"
                  phone: "+1-555-0123"
      responses:
        '201':
          description: Organization created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Organization'
                  - type: object
                    properties:
                      api_key:
                        type: string
                        description: API key for organization authentication
                      api_secret:
                        type: string
                        description: API secret for organization authentication
              example:
                id: "054d633e-382c-4fe0-a2f2-3c31023123f1"
                name: "Secure Test Company"
                context_prefix: "org_mfo99g9e_"
                api_key: "YOUR_ORG_API_KEY"
                api_secret: "YOUR_ORG_API_SECRET"
                status: "active"
                settings:
                  max_trunks: 5
                  max_dids: 10
                  max_users: 50
                  max_queues: 10
                  recording_enabled: false
                  webhook_enabled: true
                  features:
                    call_transfer: true
                    call_recording: true
                    voicemail: true
                    conference: true
                    ivr: true
                    ai_agent: false
                limits:
                  concurrent_calls: 10
                  monthly_minutes: 10000
                  storage_gb: 10
                createdAt: "2025-09-17T17:28:10.899Z"
                updatedAt: "2025-09-17T17:28:10.899Z"
        '401':
          description: Unauthorized - Invalid admin credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  required_fields:
                    type: array
                    items:
                      type: string
              examples:
                missing_credentials:
                  summary: Missing admin credentials
                  value:
                    error: "Admin credentials required"
                    required_fields: ["admin_username", "admin_password"]
                invalid_credentials:
                  summary: Invalid admin credentials
                  value:
                    error: "Invalid admin credentials"
        '400':
          description: Bad request - Invalid input data
        '500':
          description: Internal server error

  # SIP Trunk Management
  /trunks:
    get:
      tags: [SIP Trunks]
      summary: List all SIP trunks
      description: |
        Retrieve all SIP trunks for the organization

        **Example curl:**
        ```bash
        curl -X GET ${YOUR_SERVER_URL}/api/v1/trunks \
          -H "Authorization: Bearer YOUR_ORG_TOKEN"
        ```
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of SIP trunks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SipTrunk'
    post:
      tags: [SIP Trunks]
      summary: Create new SIP trunk
      description: |
        Create a new SIP trunk for inbound/outbound calling.

        **Trunk Types:**
        - **inbound**: Remote provider registers TO our server (dynamic registration, NO host required)
        - **outbound**: We register TO remote provider (we authenticate to them, host required)
        - **peer2peer**: No registration - SIP OPTIONS keepalive only (host required)

        **Example curl - Outbound Registration Trunk:**
        ```bash
        curl -X POST ${YOUR_SERVER_URL}/api/v1/trunks \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "name": "VoIP Provider Registration",
            "host": "sip.provider.com",
            "port": 5060,
            "username": "myaccount",
            "password": "secret123",
            "transport": "udp",
            "trunk_type": "outbound",
            "retry_interval": 60,
            "expiration": 3600
          }'
        ```

        **Example curl - Inbound Trunk (Provider registers to us):**
        ```bash
        curl -X POST ${YOUR_SERVER_URL}/api/v1/trunks \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "name": "Remote Provider Inbound",
            "username": "provider_user",
            "password": "provider_pass",
            "transport": "udp",
            "trunk_type": "inbound"
          }'
        ```
        **Note:** Inbound trunks do NOT require host/IP - the remote provider registers dynamically to our server using username/password.

        **Example curl - Peer2Peer Trunk (SIP OPTIONS only):**
        ```bash
        curl -X POST ${YOUR_SERVER_URL}/api/v1/trunks \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "name": "Peer Server",
            "host": "198.51.100.20",
            "port": 5060,
            "transport": "udp",
            "trunk_type": "peer2peer"
          }'
        ```
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, host]
              properties:
                name:
                  type: string
                  example: "Main SIP Provider"
                host:
                  type: string
                  example: "sip.provider.com"
                username:
                  type: string
                  example: "myaccount"
                password:
                  type: string
                  example: "secret123"
                port:
                  type: integer
                  default: 5060
                  example: 5060
                transport:
                  type: string
                  enum: [udp, tcp, tls]
                  default: udp
                  example: "udp"
                max_channels:
                  type: integer
                  default: 10
                  example: 10
            example:
              name: "Main SIP Provider"
              host: "sip.provider.com"
              port: 5060
              username: "myaccount"
              password: "secret123"
              transport: "udp"
      responses:
        '201':
          description: Trunk created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SipTrunk'

