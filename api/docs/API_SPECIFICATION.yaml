        curl -X GET ${YOUR_SERVER_URL}/api/v1/queues \
          -H "Authorization: Bearer YOUR_ORG_TOKEN"
        ```
      responses:
        '200':
          description: List of queues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Queue'
    post:
      security:
        - BearerAuth: []
      tags: [Queues]
      summary: Create new queue
      description: |
        Create a new call queue for distributing calls to agents.

        **Example curl:**
        ```bash
        curl -X POST ${YOUR_SERVER_URL}/api/v1/queues \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "name": "Support Queue",
            "number": "5000",
            "strategy": "ringall",
            "timeout": 30,
            "music_on_hold": "default",
            "recording_enabled": true
          }'
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, number]
              properties:
                name:
                  type: string
                  example: "Support Queue"
                number:
                  type: string
                  example: "5000"
                strategy:
                  type: string
                  enum: [ringall, leastrecent, fewestcalls, random, rrmemory, linear]
                  default: ringall
                  example: "ringall"
                timeout:
                  type: integer
                  default: 15
                  example: 30
                max_wait_time:
                  type: integer
                  default: 300
                  example: 300
                music_on_hold:
                  type: string
                  default: default
                  example: "default"
                ring_sound:
                  type: string
                  default: ring
                  example: "ring"
                recording_enabled:
                  type: boolean
                  default: false
                  example: true
            example:
              name: "Support Queue"
              number: "5000"
              strategy: "ringall"
              timeout: 30
              music_on_hold: "default"
              recording_enabled: true
      responses:
        '201':
          description: Queue created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Queue'

