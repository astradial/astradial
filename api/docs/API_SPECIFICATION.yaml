      summary: Add new DID number
      description: |
        Create a new DID number and configure its routing.

        **Example curl:**
        ```bash
        curl -X POST ${YOUR_SERVER_URL}/api/v1/dids \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "number": "+15550123456",
            "trunk_id": "TRUNK_UUID",
            "routing_type": "queue",
            "routing_destination": "QUEUE_UUID",
            "description": "Main customer support line",
            "recording_enabled": true
          }'
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [number, trunk_id, routing_type, routing_destination]
              properties:
                number:
                  type: string
                  example: "+15550123456"
                trunk_id:
                  type: string
                  format: uuid
                  example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                description:
                  type: string
                  example: "Main customer support line"
                routing_type:
                  type: string
                  enum: [extension, queue, ivr, ai_agent, intercom, external]
                  description: |
                    - extension: Route to an extension number (e.g., "100")
                    - queue: Route to a queue by ID
                    - ivr: Route to an IVR menu by ID
                    - ai_agent: Route to AI agent via pipecat WSS URL (e.g., "ws://your-server:8765")
                    - intercom: Page/intercom an extension with auto-answer (e.g., "100")
                    - external: Route to an external number
                  example: "queue"
                routing_destination:
                  type: string
                  description: "Extension number, Queue ID, IVR ID, pipecat WSS URL, intercom extension, or external number"
                  example: "queue-uuid-here"
                recording_enabled:
                  type: boolean
                  default: false
                  example: true
            example:
              number: "+15550123456"
              trunk_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              routing_type: "queue"
              routing_destination: "queue-uuid-here"
              description: "Main customer support line"
              recording_enabled: true
      responses:
        '201':
          description: DID created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DidNumber'

