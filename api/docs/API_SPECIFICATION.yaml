                  enum: [emergency, local, long_distance, international, toll_free, custom]
                priority:
                  type: integer
                status:
                  type: string
                  enum: [active, inactive]
      responses:
        '200':
          description: Outbound route updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboundRoute'
    delete:
      security:
        - BearerAuth: []
      tags: [Outbound Routes]
      summary: Delete outbound route
      description: |
        Delete an outbound route

        **Example curl:**
        ```bash
        curl -X DELETE ${YOUR_SERVER_URL}/api/v1/outbound-routes/ROUTE_UUID \
          -H "Authorization: Bearer YOUR_ORG_TOKEN"
        ```
      parameters:
        - name: routeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Outbound route deleted

  # Webhook Management
  /webhooks:
    get:
      security:
        - BearerAuth: []
      tags: [Webhooks]
      summary: List all webhooks
      description: |
        Retrieve all webhooks for the organization

        **Example curl:**
        ```bash
        curl -X GET ${YOUR_SERVER_URL}/api/v1/webhooks \
          -H "Authorization: Bearer YOUR_ORG_TOKEN"
        ```
      responses:
        '200':
          description: List of webhooks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Webhook'
    post:
      security:
        - BearerAuth: []
      tags: [Webhooks]
      summary: Register webhook
      description: |
        Register a new webhook for call events

        **Example curl:**
        ```bash
        curl -X POST ${YOUR_SERVER_URL}/api/v1/webhooks \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "url": "https://myapp.com/webhook",
            "events": ["call.initiated", "call.answered", "call.ended"],
            "secret": "my-webhook-secret"
          }'
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, events]
              properties:
                url:
                  type: string
                  format: uri
                events:
                  type: array
                  items:
                    type: string
                    enum: [call.initiated, call.answered, call.ended, call.failed]
                secret:
                  type: string
                  description: Secret for HMAC validation
      responses:
        '201':
          description: Webhook registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'

  /webhooks/{webhookId}:
    get:
      security:
        - BearerAuth: []
      tags: [Webhooks]
      summary: Get webhook details
