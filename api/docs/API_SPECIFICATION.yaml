          description: Settings retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  settings:
                    $ref: '#/components/schemas/GlobalSettings'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

    put:
      tags:
        - Admin - Global Settings
      summary: Update global PBX settings
      description: Update global PBX configuration settings
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pjsip_transport:
                  $ref: '#/components/schemas/PJSIPTransport'
                rtp_config:
                  $ref: '#/components/schemas/RTPConfig'
                sip_global:
                  $ref: '#/components/schemas/SIPGlobal'
                codecs:
                  $ref: '#/components/schemas/CodecConfig'
                system:
                  $ref: '#/components/schemas/SystemConfig'
                ami_config:
                  $ref: '#/components/schemas/AMIConfig'
                security:
                  $ref: '#/components/schemas/SecurityConfig'
                voicemail:
                  $ref: '#/components/schemas/VoicemailConfig'
