        rtp_config:
          $ref: '#/components/schemas/RTPConfig'
        sip_global:
          $ref: '#/components/schemas/SIPGlobal'
        codecs:
          $ref: '#/components/schemas/CodecConfig'
        system:
          $ref: '#/components/schemas/SystemConfig'
        ami_config:
