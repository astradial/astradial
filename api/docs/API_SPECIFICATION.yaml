  # Call Logs
  /calls:
    get:
      security:
        - BearerAuth: []
      tags: [Call Management]
      summary: List call logs
      description: |
        Paginated call logs with filtering. Returns one record per call
        (deduped by linkedid — keeps the longest-duration channel leg).

        Every CDR row is tagged with the org's UUID via `accountcode` so
        only calls belonging to the authenticated org are returned.
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
          description: Number of records per page
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
          description: Pagination offset
        - name: direction
          in: query
          schema: { type: string, enum: [inbound, outbound, internal, all] }
          description: Filter by call direction
        - name: disposition
          in: query
          schema: { type: string, enum: [ANSWERED, NO ANSWER, BUSY, FAILED] }
          description: Filter by call outcome (Asterisk disposition)
        - name: from
          in: query
          schema: { type: string }
          description: Filter by caller number (partial match)
        - name: to
          in: query
          schema: { type: string }
          description: Filter by destination number (partial match)
        - name: date_from
          in: query
          schema: { type: string, format: date }
          description: Start date (YYYY-MM-DD, inclusive)
        - name: date_to
          in: query
          schema: { type: string, format: date }
          description: End date (YYYY-MM-DD, inclusive)
        - name: search
          in: query
          schema: { type: string }
          description: Free-text search across caller number, destination, and caller ID
      responses:
        "200":
          description: Paginated call log
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        started_at: { type: string, format: date-time }
                        ended_at: { type: string, format: date-time }
                        from_number: { type: string }
                        caller_id: { type: string }
                        to_number: { type: string }
                        duration: { type: integer, description: "Total seconds (ring + talk)" }
                        talk_time: { type: integer, description: "Talk seconds only (billsec)" }
                        disposition: { type: string, enum: [ANSWERED, NO ANSWER, BUSY, FAILED] }
                        direction: { type: string, enum: [inbound, outbound, internal] }
                        org_id: { type: string, format: uuid }
                        channel: { type: string }
                        destination_channel: { type: string }
                        dcontext: { type: string }
                        lastapp: { type: string }
                        call_id: { type: string }
                        linkedid: { type: string }
                        recording_file: { type: string }
                        recording_url: { type: string, nullable: true }
                  pagination:
                    type: object
                    properties:
                      total: { type: integer }
                      limit: { type: integer }
                      offset: { type: integer }
                      has_more: { type: boolean }
        "401":
          description: Authentication required

  # Call Recording
  /calls/{callId}/recording:
    get:
      security:
        - BearerAuth: []
      tags: [Call Management]
      summary: Download call recording
      description: |
        Download the WAV recording file for a completed call.
        Returns the recording as a downloadable WAV file.

        **Authentication:** Use Bearer token or API Key headers.

        **Example curl:**
        ```bash
        curl -X GET \${YOUR_SERVER_URL}/api/v1/calls/CALL_UUID/recording \
          -H "Authorization: Bearer YOUR_JWT_TOKEN" \
          --output recording.wav
        ```
      parameters:
        - name: callId
          in: path
          required: true
          schema:
            type: string
          description: The call record ID (UUID from GET /calls response)
      responses:
        '200':
          description: WAV audio file download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Authentication required
        '404':
          description: Call not found or no recording available
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: No recording available for this call
    post:
      security:
        - BearerAuth: []
      tags: [Call Management]
      summary: Enable/disable call recording on active call
      description: |
        Enable or disable recording for a currently active call.

        **Example curl:**
        ```bash
        curl -X POST \${YOUR_SERVER_URL}/api/v1/calls/CALL_UUID/recording \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"enabled": true}'
        ```
      parameters:
        - name: callId
          in: path
          required: true
          schema:
            type: string
          description: The call record ID (UUID)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        '200':
          description: Recording status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  call_id:
                    type: string
                  recording_enabled:
                    type: boolean
                  message:
                    type: string
        '404':
          description: Call not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  # Call Statistics
  /calls/count:
    get:
      security:
        - BearerAuth: []
      tags: [Call Management]
      summary: Get call count and statistics
      description: |
        Retrieve call statistics with optional filters

        **Example curl:**
        ```bash
        curl -X GET "${YOUR_SERVER_URL}/api/v1/calls/count?status=completed&from=2025-01-01T00:00:00Z&to=2025-12-31T23:59:59Z" \
          -H "Authorization: Bearer YOUR_ORG_TOKEN"
        ```
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, completed, failed]
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Call statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  active:
                    type: integer
                  completed:
                    type: integer
                  failed:
                    type: integer
                  average_duration:
                    type: integer
                  total_duration:
                    type: integer
                example:
                  total: 150
                  active: 3
                  completed: 140
                  failed: 7
                  average_duration: 245
                  total_duration: 34300

  /calls/live:
    get:
      security:
        - BearerAuth: []
      tags: [Call Management]
      summary: Get live active calls
      description: |
        Retrieve all currently active calls for this organization in real-time via Asterisk AMI.
        Returns caller info, connected party, duration, context, application, and bridge details.
        Only shows channels belonging to the authenticated organization.
      responses:
        '200':
          description: Active calls for this organization
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    description: Number of active calls
                  calls:
                    type: array
                    items:
                      type: object
                      properties:
                        channel_id:
                          type: string
                          description: Asterisk channel ID (use for hangup/hold/transfer)
                          example: "PJSIP/1001-00000003"
                        uniqueid:
                          type: string
                        from:
                          type: string
                          description: Caller number
                        from_name:
                          type: string
                        to:
                          type: string
                          description: Connected party number
                        to_name:
                          type: string
                        status:
                          type: string
                          enum: [Up, Ringing, Ring, Down]
                        context:
                          type: string
                        extension:
                          type: string
                        duration:
                          type: integer
                          description: Call duration in seconds
                        application:
                          type: string
                          description: Current Asterisk application (Queue, Dial, MusicOnHold, etc.)
                        bridge_id:
                          type: string

  /calls/channels:
    get:
      security:
        - BearerAuth: []
      tags: [Call Management]
      summary: Get active channels with full details
      description: |
        Retrieve all active Asterisk channels for this organization with detailed channel information.
        Returns channel IDs needed for call control operations (hangup, hold, transfer).

        **Use this endpoint to get `channel_id` values required by:**
        - `POST /calls/{channelId}/hangup`
        - `POST /calls/{channelId}/hold`
        - `POST /calls/{channelId}/unhold`
        - `POST /calls/{channelId}/transfer`
      responses:
        '200':
          description: Active channels
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  org_id:
                    type: string
                    format: uuid
                  channels:
                    type: array
                    items:
                      type: object
                      properties:
                        channel_id:
                          type: string
                          example: "PJSIP/1001-00000003"
                        channel_name:
                          type: string
                        uniqueid:
                          type: string
                        linkedid:
                          type: string
                        state:
                          type: string
                          enum: [Up, Ringing, Ring, Down, Busy]
                        caller_number:
                          type: string
                        caller_name:
                          type: string
                        connected_number:
                          type: string
                        connected_name:
                          type: string
                        context:
                          type: string
                        extension:
                          type: string
                        application:
                          type: string
                        application_data:
                          type: string
                        duration:
                          type: integer
                        bridge_id:
                          type: string

  /calls/{channelId}/hangup:
    post:
      security:
        - BearerAuth: []
      tags: [Call Management]
      summary: Hang up an active call
      description: |
        Terminate an active call immediately. Get the `channelId` from `GET /calls/channels` or `GET /calls/live`.
      parameters:
        - name: channelId
          in: path
          required: true
          schema:
            type: string
          description: Asterisk channel ID (e.g., PJSIP/1001-00000003)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  enum: [normal, busy, congestion]
                  default: normal
                  description: Hangup cause
      responses:
        '200':
          description: Call terminated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  channel_id:
                    type: string
                  reason:
                    type: string

  /calls/{channelId}/hold:
    post:
      security:
        - BearerAuth: []
      tags: [Call Management]
      summary: Put a call on hold
      description: |
        Place an active call on hold. The caller hears music on hold until the call is resumed via `POST /calls/{channelId}/unhold`.
      parameters:
        - name: channelId
          in: path
          required: true
          schema:
            type: string
          description: Asterisk channel ID
      responses:
        '200':
          description: Call placed on hold
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  channel_id:
                    type: string

  /calls/{channelId}/unhold:
    post:
      security:
        - BearerAuth: []
      tags: [Call Management]
      summary: Resume a call from hold
      description: |
        Remove a call from hold and redirect it to a destination extension.
      parameters:
        - name: channelId
          in: path
          required: true
          schema:
            type: string
          description: Asterisk channel ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [destination]
              properties:
                destination:
                  type: string
                  description: Extension to redirect the call to after unhold
                  example: "1001"
      responses:
        '200':
          description: Call resumed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  channel_id:
                    type: string
                  destination:
                    type: string

  /calls/{channelId}/transfer:
    post:
      security:
        - BearerAuth: []
      tags: [Call Management]
      summary: Transfer an active call
      description: |
        Transfer an active call to another extension, queue, or external number.
      parameters:
        - name: channelId
          in: path
          required: true
          schema:
            type: string
          description: Asterisk channel ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [destination]
              properties:
                destination:
                  type: string
                  description: Destination extension, queue number, or external number
                  example: "1002"
                destination_type:
                  type: string
                  enum: [extension, queue, external]
                  default: extension
                  description: Type of destination for correct routing context
      responses:
        '200':
          description: Call transferred
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  transfer:
                    type: object
                    properties:
                      channel_id:
                        type: string
                      destination:
                        type: string
                      destination_type:
                        type: string
                      context:
                        type: string

  # Click-to-Call
  /calls/click-to-call:
    post:
      security:
        - BearerAuth: []
      tags: [Call Management]
      summary: Initiate a click-to-call between two parties
      description: |
        Initiate a call between two parties using Asterisk AMI Originate.
        The system will first call the 'from' party, then bridge them to the 'to' destination.

        Supports multiple destination types:
        - **extension**: Internal extension/user
        - **queue**: Call queue
        - **ivr**: IVR/auto-attendant
        - **ai_agent**: AI agent endpoint
        - **external**: External phone number

        **Example curl (call extension to extension):**
        ```bash
        curl -X POST ${YOUR_SERVER_URL}/api/v1/calls/click-to-call \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "from": "2001",
            "to": "2002",
            "to_type": "extension"
          }'
        ```

        **Example curl (call extension to queue):**
        ```bash
        curl -X POST ${YOUR_SERVER_URL}/api/v1/calls/click-to-call \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "from": "2001",
            "to": "support",
            "to_type": "queue",
            "caller_id": "Support Request"
          }'
        ```

        **Example curl (call extension to external number):**
        ```bash
        curl -X POST ${YOUR_SERVER_URL}/api/v1/calls/click-to-call \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "from": "2001",
            "to": "+15551234567",
            "to_type": "external",
            "timeout": 45
          }'
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from, to]
              properties:
                from:
                  type: string
                  description: Source extension or number (will be called first)
                  example: "2001"
                to:
                  type: string
                  description: Destination (extension, queue, IVR, AI agent, or external number)
                  example: "2002"
                to_type:
                  type: string
                  enum: [extension, queue, ivr, ai_agent, external]
                  default: extension
                  description: Type of destination
                caller_id:
                  type: string
                  description: Caller ID to display (optional, defaults to 'from')
                  example: "John Doe"
                timeout:
                  type: integer
                  description: Call timeout in seconds
                  default: 30
                  example: 45
                context:
                  type: string
                  description: Custom Asterisk context (optional, auto-determined from to_type)
                  example: "testorg_internal"
                variables:
                  type: object
                  description: Additional channel variables to set
                  additionalProperties:
                    type: string
                  example:
                    CAMPAIGN_ID: "campaign-123"
                    CALL_TYPE: "outbound"
            examples:
              extensionToExtension:
                summary: Extension to Extension
                value:
                  from: "2001"
                  to: "2002"
                  to_type: "extension"
              extensionToQueue:
                summary: Extension to Queue
                value:
                  from: "2001"
                  to: "support"
                  to_type: "queue"
                  caller_id: "Support Request"
              extensionToExternal:
                summary: Extension to External Number
                value:
                  from: "2001"
                  to: "+15551234567"
                  to_type: "external"
                  timeout: 45
              extensionToIVR:
                summary: Extension to IVR
                value:
                  from: "2003"
                  to: "1000"
                  to_type: "ivr"
              extensionToAI:
                summary: Extension to AI Agent
                value:
                  from: "2001"
                  to: "ai-agent-001"
                  to_type: "ai_agent"
                  variables:
                    AI_PROMPT: "customer_support"
      responses:
        '200':
          description: Call initiated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Call initiated successfully"
                  call:
                    type: object
                    properties:
                      from:
                        type: string
                        example: "2001"
                      to:
                        type: string
                        example: "2002"
                      to_type:
                        type: string
                        example: "extension"
                      caller_id:
                        type: string
                        example: "2001"
                      destination:
                        type: string
                        example: "2002"
                      context:
                        type: string
                        example: "testorg_internal"
                      timeout:
                        type: integer
                        example: 30
                      response:
                        type: object
                        description: AMI response data
        '400':
          description: Bad request - missing or invalid parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Missing required fields"
                  required:
                    type: array
                    items:
                      type: string
                    example: ["from", "to"]
        '401':
          description: Unauthorized - Invalid or missing token
        '500':
          description: Server error - Failed to initiate call
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to initiate click-to-call"
                  details:
                    type: string
                    example: "AMI connection failed"

  /calls/originate-to-ai:
    post:
      security:
        - BearerAuth: []
      tags: [Call Management]
      summary: Originate call to remote party and connect to AI agent Stasis app
      description: |
        Originate a call to a remote party (extension or external number) and immediately
        connect the call to an Asterisk Stasis AI agent application when they answer.

        This endpoint is designed for AI-powered calling systems that use Asterisk ARI (Asterisk REST Interface)
        to handle calls programmatically. When the remote party answers, the call enters a Stasis application
        where an AI agent can control the conversation.

        **Key Features:**
        - Direct call origination to Stasis app (no dialplan routing)
        - WebSocket URL support for external AI services
        - Supports both internal extensions and external numbers
        - Channel variables passed to AI agent handler
        - Async call origination (non-blocking)

        **Use Cases:**
        - AI-powered outbound calling campaigns
        - Automated appointment reminders with conversational AI
        - Customer surveys with natural language processing
        - Voice assistant integrations (OpenAI Realtime API, Deepgram, etc.)
        - Real-time speech-to-speech translation services

        **Example curl (call extension with AI agent):**
        ```bash
        curl -X POST ${YOUR_SERVER_URL}/api/v1/calls/originate-to-ai \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "to": "2001",
            "caller_id": "AI Assistant",
            "wss_url": "wss://ai.example.com/voice/stream"
          }'
        ```

        **Example curl (call external number with OpenAI):**
        ```bash
        curl -X POST ${YOUR_SERVER_URL}/api/v1/calls/originate-to-ai \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "to": "+15551234567",
            "caller_id": "Support Bot",
            "ai_agent_app": "ai_agent",
            "wss_url": "wss://api.openai.com/v1/realtime",
            "timeout": 45,
            "variables": {
              "CAMPAIGN_ID": "summer2024",
              "LANGUAGE": "en-US"
            }
          }'
        ```

        **Example curl (call with custom AI service):**
        ```bash
        curl -X POST ${YOUR_SERVER_URL}/api/v1/calls/originate-to-ai \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "to": "2002",
            "wss_url": "wss://voice-ai.myservice.com/stream",
            "variables": {
              "AGENT_TYPE": "sales",
              "PRIORITY": "high"
            }
          }'
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to]
              properties:
                to:
                  type: string
                  description: |
                    Destination to call - can be:
                    - Internal extension (3-4 digits): "2001"
                    - External phone number: "+15551234567"
                  example: "2001"
                caller_id:
                  type: string
                  description: Caller ID displayed to the called party
                  default: "AI Agent"
                  example: "AI Assistant"
                ai_agent_app:
                  type: string
                  description: Name of the Asterisk Stasis application to use
                  default: "ai_agent"
                  example: "ai_agent"
                wss_url:
                  type: string
                  description: |
                    WebSocket URL for AI agent service (optional).
                    Must start with wss:// or ws://.
                    This URL is passed to the AI agent via channel variable WSS_URL.
                  example: "wss://ai.example.com/voice/stream"
                timeout:
                  type: integer
                  description: Call timeout in seconds
                  default: 30
                  example: 45
                variables:
                  type: object
                  description: Additional channel variables to pass to AI agent
                  additionalProperties:
                    type: string
                  example:
                    CAMPAIGN_ID: "summer2024"
                    LANGUAGE: "en-US"
                    AGENT_TYPE: "sales"
            examples:
              basicExtension:
                summary: Call Extension with AI Agent
                value:
                  to: "2001"
                  caller_id: "AI Support Bot"
              externalWithWebSocket:
                summary: Call External Number with WebSocket
                value:
                  to: "+15551234567"
                  caller_id: "AI Sales Assistant"
                  wss_url: "wss://ai.example.com/voice"
                  timeout: 45
                  variables:
                    CAMPAIGN_ID: "summer2024"
                    LANGUAGE: "en-US"
              openAIRealtime:
                summary: OpenAI Realtime API Integration
                value:
                  to: "2002"
                  wss_url: "wss://api.openai.com/v1/realtime"
                  variables:
                    OPENAI_MODEL: "gpt-4o-realtime-preview"
                    VOICE: "alloy"
              customAIService:
                summary: Custom AI Service with Variables
                value:
                  to: "+15559876543"
                  caller_id: "Customer Survey Bot"
                  wss_url: "wss://voice-ai.myservice.com/stream"
                  ai_agent_app: "ai_agent"
                  timeout: 60
                  variables:
                    SURVEY_ID: "q4-2024"
                    CUSTOMER_ID: "12345"
                    RETRY_COUNT: "0"
      responses:
        '200':
          description: Call to AI agent initiated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Call to AI agent initiated successfully"
                  call:
                    type: object
                    properties:
                      to:
                        type: string
                        example: "2001"
                      endpoint:
                        type: string
                        description: Asterisk endpoint that was called
                        example: "PJSIP/2001"
                      caller_id:
                        type: string
                        example: "AI Agent"
                      ai_agent_app:
                        type: string
                        example: "ai_agent"
                      wss_url:
                        type: string
                        nullable: true
                        example: "wss://ai.example.com/voice/stream"
                      timeout:
                        type: integer
                        example: 30
                      channel:
                        type: string
                        description: Asterisk channel that was originated
                        example: "PJSIP/2001"
                      response:
                        type: object
                        description: AMI originate response
                        properties:
                          success:
                            type: boolean
                            example: true
                          response:
                            type: string
                            example: "Response: Success\r\n..."
              example:
                success: true
                message: "Call to AI agent initiated successfully"
                call:
                  to: "2001"
                  endpoint: "PJSIP/2001"
                  caller_id: "AI Agent"
                  ai_agent_app: "ai_agent"
                  wss_url: "wss://ai.example.com/voice/stream"
                  timeout: 30
                  channel: "PJSIP/2001"
                  response:
                    success: true
                    response: "Response: Success"
        '400':
          description: Bad request - missing or invalid parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Invalid WSS URL"
                  message:
                    type: string
                    example: "WSS URL must start with wss:// or ws://"
              examples:
                missingTo:
                  summary: Missing required field
                  value:
                    error: "Missing required fields"
                    required: ["to"]
                invalidWssUrl:
                  summary: Invalid WSS URL format
                  value:
                    error: "Invalid WSS URL"
                    message: "WSS URL must start with wss:// or ws://"
        '401':
          description: Unauthorized - Invalid or missing JWT token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Unauthorized"
                  message:
                    type: string
                    example: "Organization ID not found in token"
        '404':
          description: Organization not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Organization not found"
        '500':
          description: Server error - Failed to initiate AI agent call
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to initiate AI agent call"
                  details:
                    type: string
                    example: "AMI connection failed"

  /calls/{channelId}/transfer:
    post:
      security:
        - BearerAuth: []
      tags: [Call Management]
      summary: Transfer an active call
      description: |
        Transfer an active call to another destination (extension, queue, etc.).
        This performs a blind transfer using Asterisk ARI.

        **Example curl:**
        ```bash
        curl -X POST ${YOUR_SERVER_URL}/api/v1/calls/CHANNEL_ID/transfer \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "destination": "2003",
            "type": "blind",
            "context": "testorg_internal"
          }'
        ```
      parameters:
        - name: channelId
          in: path
          required: true
          schema:
            type: string
          description: Asterisk channel ID (e.g., PJSIP/2001-00000001)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [destination]
              properties:
                destination:
                  type: string
                  description: Transfer destination (extension, queue number, etc.)
                  example: "2003"
                type:
                  type: string
                  enum: [blind, attended]
                  default: blind
                  description: Transfer type
                context:
                  type: string
                  description: Asterisk context (optional, auto-determined from org)
                  example: "testorg_internal"
      responses:
        '200':
          description: Call transferred successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Call transferred successfully"
                  transfer:
                    type: object
                    properties:
                      channel_id:
                        type: string
                      destination:
                        type: string
                      context:
                        type: string
                      type:
                        type: string
        '400':
          description: Bad request - missing destination
        '401':
          description: Unauthorized - Invalid or missing token
        '503':
          description: Service unavailable - ARI not connected
        '500':
          description: Server error - Transfer failed

  /calls:
    get:
      security:
        - BearerAuth: []
      tags: [Call Management]
      summary: Get call history
      description: |
        Retrieve call history with pagination and filtering.

        **Example curl:**
        ```bash
        curl -X GET "${YOUR_SERVER_URL}/api/v1/calls?limit=50&offset=0&status=answered" \
          -H "Authorization: Bearer YOUR_ORG_TOKEN"
        ```
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
          description: Number of records to return
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Number of records to skip
        - name: status
          in: query
          schema:
            type: string
            enum: [ringing, answered, busy, failed, no-answer, completed]
          description: Filter by call status
        - name: direction
          in: query
          schema:
            type: string
            enum: [inbound, outbound, internal]
          description: Filter by call direction
      responses:
        '200':
          description: Call history retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  calls:
                    type: array
                    items:
                      $ref: '#/components/schemas/CallRecord'
                  count:
                    type: integer
                    description: Number of calls in this response
                  total:
                    type: integer
                    description: Total number of calls matching filters
                  limit:
                    type: integer
                  offset:
                    type: integer
        '401':
          description: Unauthorized

  /organizations/{organizationId}:
    get:
      security:
        - BearerAuth: []
      tags: [Organization Management]
      summary: Get organization details
      description: |
        Get details of a specific organization by ID

        **Example curl:**
        ```bash
        curl -X GET ${YOUR_SERVER_URL}/api/v1/organizations/ORG_UUID \
          -H "Authorization: Bearer YOUR_ORG_TOKEN"
        ```
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Organization UUID
      responses:
        '200':
          description: Organization details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '401':
          description: Unauthorized - Invalid or missing token
        '403':
          description: Forbidden - Access denied to this organization
        '404':
          description: Organization not found
    put:
      security:
        - BearerAuth: []
      tags: [Organization Management]
      summary: Update organization settings
      description: |
        Update organization configuration including settings, limits, features, and contact information.
        All fields are optional - only provided fields will be updated (merged with existing values).

        **Example curl:**
        ```bash
        curl -X PUT ${YOUR_SERVER_URL}/api/v1/organizations/ORG_UUID \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "settings": {
              "features": {
                "ai_agent": true,
                "call_recording": true
              }
            },
            "limits": {
              "concurrent_calls": 100
            },
            "contact_info": {
              "email": "new-admin@company.com"
            }
          }'
        ```
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Organization UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  pattern: '^[a-zA-Z0-9][a-zA-Z0-9-]*[a-zA-Z0-9]$|^[a-zA-Z0-9]$'
                  minLength: 3
                  maxLength: 50
                domain:
                  type: string
                status:
                  type: string
                  enum: [active, suspended, deleted]
                settings:
                  type: object
                  description: Settings are merged with existing values
                  properties:
                    max_trunks:
                      type: integer
                    max_dids:
                      type: integer
                    max_users:
                      type: integer
                    max_queues:
                      type: integer
                    recording_enabled:
                      type: boolean
                    webhook_enabled:
                      type: boolean
                    features:
                      type: object
                      description: Features are merged with existing feature flags
                      properties:
                        call_transfer:
                          type: boolean
                        call_recording:
                          type: boolean
                        voicemail:
                          type: boolean
                        conference:
                          type: boolean
                        ivr:
                          type: boolean
                        ai_agent:
                          type: boolean
                limits:
                  type: object
                  description: Limits are merged with existing limits
                  properties:
                    concurrent_calls:
                      type: integer
                    monthly_minutes:
                      type: integer
                    storage_gb:
                      type: integer
                contact_info:
                  type: object
                  description: Contact info is merged with existing values
                  properties:
                    email:
                      type: string
                      format: email
                    phone:
                      type: string
                    address:
                      type: string
            example:
              settings:
                features:
                  ai_agent: true
                  call_recording: true
              limits:
                concurrent_calls: 100
              contact_info:
                email: "new-admin@company.com"
      responses:
        '200':
          description: Organization updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '400':
          description: Bad request - Invalid input
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Cannot update other organization
        '404':
          description: Organization not found


  # ========================================
  # ADMIN - GLOBAL SETTINGS
  # ========================================
  /admin/settings:
    get:
      tags:
        - Admin - Global Settings
