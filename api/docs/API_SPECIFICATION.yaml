  /admin/settings/deploy:
    post:
      tags:
        - Admin - Global Settings
      summary: Deploy settings to Asterisk
      description: |
        Deploy current global settings to Asterisk via AMI.

        **Deployment Modes:**
        - **Default (reload)**: Reloads affected modules only (minimal disruption)
        - **Restart mode**: Full Asterisk restart - **WARNING: Drops ALL active calls across ALL organizations**

        Use restart mode only when absolutely necessary (e.g., AMI configuration changes).
      security:
        - BearerAuth: []
      parameters:
        - name: restart
          in: query
          description: Set to 'true' to perform full Asterisk restart (WARNING - drops all calls)
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                restart:
                  type: boolean
                  default: false
                  description: Set to true to perform full Asterisk restart (WARNING - drops all calls)
      responses:
        '200':
          description: Settings deployed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  deployment:
                    type: object
                  settings_version:
                    type: integer
                  deployed_at:
                    type: string
                    format: date-time
                  restart_performed:
                    type: boolean
                  warning:
                    type: string
                    nullable: true
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: No settings found
        '500':
          description: Deployment failed

