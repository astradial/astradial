        - BearerAuth: []
      tags: [Users]
      summary: Update user extension routing
      description: |
        Change how calls to this extension are routed.
        - `sip`: Normal SIP phone (default)
        - `ai_agent`: Route to AI agent via pipecat WSS URL

        After updating, regenerate Asterisk configs via `POST /organizations/{orgId}/regenerate`.

        **Example - Route to AI agent:**
        ```bash
        curl -X PUT ${YOUR_SERVER_URL}/api/v1/users/USER_UUID/routing \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "routing_type": "ai_agent",
            "routing_destination": "ws://your-pipecat-server:8765"
          }'
        ```

        **Example - Revert to SIP phone:**
        ```bash
        curl -X PUT ${YOUR_SERVER_URL}/api/v1/users/USER_UUID/routing \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"routing_type": "sip"}'
        ```
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [routing_type]
              properties:
                routing_type:
                  type: string
                  enum: [sip, ai_agent]
                  description: |
                    - sip: Ring the PJSIP endpoint (default)
                    - ai_agent: Connect to AI agent via pipecat WSS URL
                routing_destination:
                  type: string
                  description: "WSS URL for ai_agent (required when routing_type is ai_agent)"
                  example: "ws://your-pipecat-server:8765"
            examples:
              ai_agent:
                summary: Route to AI agent
                value:
                  routing_type: "ai_agent"
                  routing_destination: "ws://your-pipecat-server:8765"
              sip:
                summary: Revert to SIP phone
                value:
                  routing_type: "sip"
      responses:
        '200':
          description: Routing updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

