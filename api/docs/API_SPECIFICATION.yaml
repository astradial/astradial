  # Music on Hold
  /moh:
    get:
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      tags: [Music on Hold]
      summary: List MOH files
      description: |
        List all uploaded music on hold files and classes for the organization.

        **Workflow:** Upload audio → Get `moh_class_name` from this endpoint → Assign to queue via `PUT /queues/{queueId}/moh`.
      responses:
        '200':
          description: MOH files and classes
          content:
            application/json:
              schema:
                type: object
                properties:
                  org_classes:
                    type: array
                    items:
                      type: object
                      properties:
                        class:
                          type: string
                          description: Short class name (e.g. "default")
                        moh_class_name:
                          type: string
                          description: Full Asterisk MOH class name — use this value when assigning to a queue
                        file_count:
                          type: integer
                        files:
                          type: array
                          items:
                            type: object
                            properties:
                              filename:
                                type: string
                              size:
                                type: integer
                                description: File size in bytes
                              uploaded_at:
                                type: string
                                format: date-time
                  system_classes:
                    type: array
                    description: Built-in Asterisk MOH classes (may not have audio files)
                    items:
                      type: string
              example:
                org_classes:
                  - class: default
                    moh_class_name: org_abc123_default
                    file_count: 2
                    files:
                      - filename: lobby-music_1775046205517.wav
                        size: 568880
                        uploaded_at: "2026-04-01T12:23:27.202Z"
                system_classes: [default, classical, modern, jazz, silence]

  /moh/upload:
    post:
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      tags: [Music on Hold]
      summary: Upload MOH audio
      description: |
        Upload an audio file for music on hold. Accepts common audio formats — automatically converts to 8kHz 16-bit mono WAV (Asterisk native format).

        **Supported formats:** mp3, wav, ogg, flac, m4a, aac, webm (max 10MB).

        **After upload:** Use the returned `moh_class_name` to assign to queues via `PUT /queues/{queueId}/moh`.
        Config is auto-deployed — no manual reload needed.

        **Example curl:**
        ```bash
        curl -X POST ${YOUR_SERVER_URL}/api/v1/moh/upload \
          -H "X-API-Key: YOUR_API_KEY" \
          -F "audio=@/path/to/music.mp3" \
          -F "class=default"
        ```
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [audio]
              properties:
                audio:
                  type: string
                  format: binary
                  description: Audio file (mp3, wav, ogg, flac, m4a, aac, webm — max 10MB)
                class:
                  type: string
                  default: default
                  description: MOH class name. Use "default" for general hold music, or create custom classes like "premium", "support"
      responses:
        '201':
          description: Audio uploaded, converted, and deployed
          content:
            application/json:
              schema:
                type: object
                properties:
                  filename:
                    type: string
                    description: Generated filename on server
                  moh_class_name:
                    type: string
                    description: Full MOH class name — pass this to PUT /queues/{id}/moh
                  class:
                    type: string
                    description: Short class name
                  original_name:
                    type: string
                  size:
                    type: integer
                    description: Converted file size in bytes
                  format:
                    type: string
                  assign_to_queue:
                    type: string
                    description: Hint showing how to assign this class to a queue
              example:
                filename: lobby-music_1775046205517.wav
                moh_class_name: org_abc123_default
                class: default
                original_name: lobby-music.mp3
                size: 568880
                format: "8kHz 16-bit mono WAV"
                assign_to_queue: 'PUT /api/v1/queues/{queueId}/moh with {"music_on_hold": "org_abc123_default"}'
        '400':
          description: No audio file provided or unsupported format
        '422':
          description: Audio conversion failed (ffmpeg error)

  /moh/{className}/{filename}:
    delete:
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      tags: [Music on Hold]
      summary: Delete MOH file
      description: |
        Delete a specific audio file from an MOH class. Config is auto-deployed after deletion.

        **className** is the short class name (e.g. `default`), not the full `org_prefix_default`.
        **filename** is the exact filename from `GET /moh` (e.g. `lobby-music_1775046205517.wav`).
      parameters:
        - name: className
          in: path
          required: true
          description: Short MOH class name (e.g. "default", "premium")
          schema:
            type: string
        - name: filename
          in: path
          required: true
          description: Exact filename to delete (from GET /moh response)
          schema:
            type: string
      responses:
        '200':
          description: File deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  deleted:
                    type: string
                  class:
                    type: string
        '404':
          description: File not found

  /queues/{queueId}/moh:
    put:
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      tags: [Music on Hold]
      summary: Assign MOH class to queue
      description: |
        Assign a music on hold class to a queue. Use the `moh_class_name` value from `GET /moh` or the upload response.

        Config is auto-deployed — callers in queue will hear the new music immediately.

        **Example curl:**
        ```bash
        curl -X PUT ${YOUR_SERVER_URL}/api/v1/queues/QUEUE_UUID/moh \
          -H "X-API-Key: YOUR_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{ "music_on_hold": "org_abc123_default" }'
        ```
      parameters:
        - name: queueId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [music_on_hold]
              properties:
                music_on_hold:
                  type: string
                  description: Full MOH class name from GET /moh (moh_class_name field)
            example:
              music_on_hold: org_abc123_default
      responses:
        '200':
          description: MOH class assigned and config deployed
          content:
            application/json:
              schema:
                type: object
                properties:
                  queue_id:
                    type: string
                  queue_name:
                    type: string
                  music_on_hold:
                    type: string
        '404':
          description: Queue not found

