                          type: string
                        user_id:
                          type: string

  # Click-to-Call
  /calls/click-to-call:
    post:
      security:
        - BearerAuth: []
      tags: [Call Management]
      summary: Initiate a click-to-call between two parties
      description: |
        Initiate a call between two parties using Asterisk AMI Originate.
        The system will first call the 'from' party, then bridge them to the 'to' destination.

        Supports multiple destination types:
        - **extension**: Internal extension/user
        - **queue**: Call queue
        - **ivr**: IVR/auto-attendant
        - **ai_agent**: AI agent endpoint
        - **external**: External phone number

        **Example curl (call extension to extension):**
        ```bash
        curl -X POST ${YOUR_SERVER_URL}/api/v1/calls/click-to-call \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "from": "2001",
            "to": "2002",
            "to_type": "extension"
          }'
        ```

        **Example curl (call extension to queue):**
        ```bash
        curl -X POST ${YOUR_SERVER_URL}/api/v1/calls/click-to-call \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "from": "2001",
            "to": "support",
            "to_type": "queue",
            "caller_id": "Support Request"
          }'
        ```

        **Example curl (call extension to external number):**
        ```bash
        curl -X POST ${YOUR_SERVER_URL}/api/v1/calls/click-to-call \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "from": "2001",
            "to": "+15551234567",
            "to_type": "external",
            "timeout": 45
          }'
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from, to]
              properties:
                from:
                  type: string
                  description: Source extension or number (will be called first)
                  example: "2001"
                to:
                  type: string
                  description: Destination (extension, queue, IVR, AI agent, or external number)
                  example: "2002"
                to_type:
                  type: string
                  enum: [extension, queue, ivr, ai_agent, external]
                  default: extension
                  description: Type of destination
                caller_id:
                  type: string
                  description: Caller ID to display (optional, defaults to 'from')
                  example: "John Doe"
                timeout:
                  type: integer
                  description: Call timeout in seconds
                  default: 30
                  example: 45
                context:
                  type: string
                  description: Custom Asterisk context (optional, auto-determined from to_type)
                  example: "testorg_internal"
                variables:
                  type: object
                  description: Additional channel variables to set
                  additionalProperties:
                    type: string
                  example:
                    CAMPAIGN_ID: "campaign-123"
                    CALL_TYPE: "outbound"
            examples:
              extensionToExtension:
                summary: Extension to Extension
                value:
                  from: "2001"
                  to: "2002"
                  to_type: "extension"
              extensionToQueue:
                summary: Extension to Queue
                value:
                  from: "2001"
                  to: "support"
                  to_type: "queue"
                  caller_id: "Support Request"
              extensionToExternal:
                summary: Extension to External Number
                value:
                  from: "2001"
                  to: "+15551234567"
                  to_type: "external"
                  timeout: 45
              extensionToIVR:
                summary: Extension to IVR
                value:
                  from: "2003"
                  to: "1000"
                  to_type: "ivr"
              extensionToAI:
                summary: Extension to AI Agent
                value:
                  from: "2001"
                  to: "ai-agent-001"
                  to_type: "ai_agent"
                  variables:
                    AI_PROMPT: "customer_support"
      responses:
        '200':
          description: Call initiated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Call initiated successfully"
                  call:
                    type: object
                    properties:
                      from:
                        type: string
                        example: "2001"
                      to:
                        type: string
                        example: "2002"
                      to_type:
                        type: string
                        example: "extension"
                      caller_id:
                        type: string
                        example: "2001"
                      destination:
                        type: string
                        example: "2002"
                      context:
                        type: string
                        example: "testorg_internal"
                      timeout:
                        type: integer
                        example: 30
                      response:
                        type: object
                        description: AMI response data
        '400':
          description: Bad request - missing or invalid parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Missing required fields"
                  required:
                    type: array
                    items:
                      type: string
                    example: ["from", "to"]
        '401':
          description: Unauthorized - Invalid or missing token
        '500':
          description: Server error - Failed to initiate call
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to initiate click-to-call"
                  details:
                    type: string
                    example: "AMI connection failed"

  /organizations/{organizationId}:
    get:
      security:
        - BearerAuth: []
      tags: [Organization Management]
      summary: Get organization details
      description: |
        Get details of a specific organization by ID

        **Example curl:**
        ```bash
        curl -X GET ${YOUR_SERVER_URL}/api/v1/organizations/ORG_UUID \
          -H "Authorization: Bearer YOUR_ORG_TOKEN"
        ```
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Organization UUID
      responses:
        '200':
          description: Organization details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '401':
          description: Unauthorized - Invalid or missing token
        '403':
          description: Forbidden - Access denied to this organization
        '404':
          description: Organization not found
    put:
      security:
        - BearerAuth: []
      tags: [Organization Management]
      summary: Update organization settings
      description: |
        Update organization configuration including settings, limits, features, and contact information.
        All fields are optional - only provided fields will be updated (merged with existing values).

        **Example curl:**
        ```bash
        curl -X PUT ${YOUR_SERVER_URL}/api/v1/organizations/ORG_UUID \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "settings": {
              "features": {
                "ai_agent": true,
                "call_recording": true
              }
            },
            "limits": {
              "concurrent_calls": 100
            },
            "contact_info": {
              "email": "new-admin@company.com"
            }
          }'
        ```
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Organization UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  pattern: '^[a-zA-Z0-9][a-zA-Z0-9-]*[a-zA-Z0-9]$|^[a-zA-Z0-9]$'
                  minLength: 3
                  maxLength: 50
                domain:
                  type: string
                status:
                  type: string
                  enum: [active, suspended, deleted]
                settings:
                  type: object
                  description: Settings are merged with existing values
                  properties:
                    max_trunks:
                      type: integer
                    max_dids:
                      type: integer
                    max_users:
                      type: integer
                    max_queues:
                      type: integer
                    recording_enabled:
                      type: boolean
                    webhook_enabled:
                      type: boolean
                    features:
                      type: object
                      description: Features are merged with existing feature flags
                      properties:
                        call_transfer:
                          type: boolean
                        call_recording:
                          type: boolean
                        voicemail:
                          type: boolean
                        conference:
                          type: boolean
                        ivr:
                          type: boolean
                        ai_agent:
                          type: boolean
                limits:
                  type: object
                  description: Limits are merged with existing limits
                  properties:
                    concurrent_calls:
                      type: integer
                    monthly_minutes:
                      type: integer
                    storage_gb:
                      type: integer
                contact_info:
                  type: object
                  description: Contact info is merged with existing values
                  properties:
                    email:
                      type: string
                      format: email
                    phone:
                      type: string
                    address:
                      type: string
            example:
              settings:
                features:
                  ai_agent: true
                  call_recording: true
              limits:
                concurrent_calls: 100
              contact_info:
                email: "new-admin@company.com"
      responses:
        '200':
          description: Organization updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '400':
          description: Bad request - Invalid input
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Cannot update other organization
        '404':
          description: Organization not found

  # Admin Global Settings
  /admin/settings:
    get:
      tags: [Admin - Global Settings]
      summary: Get global PBX settings
      description: |
        Retrieve all global PBX configuration settings including PJSIP transport, RTP, codecs, and system settings.
        
        **Requires admin authentication.**
        
        **Example curl:**
        ```bash
        curl -X GET ${YOUR_SERVER_URL}/api/v1/admin/settings \
          -H "Authorization: Bearer ADMIN_JWT_TOKEN"
        ```
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Global settings retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  settings:
                    $ref: '#/components/schemas/GlobalSettings'
        '401':
          description: Unauthorized - Invalid or missing admin token
        '403':
          description: Forbidden - Admin access required

    put:
      tags: [Admin - Global Settings]
      summary: Update global PBX settings
      description: |
        Update global PBX configuration settings. Optionally deploy changes to Asterisk immediately.
        
        **Requires admin authentication.**
        
        **Example curl:**
        ```bash
        curl -X PUT ${YOUR_SERVER_URL}/api/v1/admin/settings \
          -H "Authorization: Bearer ADMIN_JWT_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "pjsip_transport": {
              "udp": {
                "enabled": true,
                "bind": "10.11.21.2:5060",
                "external_media_address": "103.92.154.211",
                "external_signaling_address": "103.92.154.211",
                "local_net": ["10.11.21.0/24", "172.25.0.0/16"]
              },
              "tcp": {
                "enabled": true,
                "bind": "10.11.21.2:5060"
              }
            },
            "rtp_config": {
              "rtp_start": 20000,
              "rtp_end": 30000
            },
            "deploy": false
          }'
        ```
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pjsip_transport:
                  $ref: '#/components/schemas/PJSIPTransport'
                rtp_config:
                  $ref: '#/components/schemas/RTPConfig'
                sip_global:
                  $ref: '#/components/schemas/SIPGlobal'
                codecs:
                  $ref: '#/components/schemas/CodecConfig'
                system:
                  $ref: '#/components/schemas/SystemConfig'
                ami_config:
                  $ref: '#/components/schemas/AMIConfig'
                security:
                  $ref: '#/components/schemas/SecurityConfig'
                voicemail:
                  $ref: '#/components/schemas/VoicemailConfig'
                logging:
                  $ref: '#/components/schemas/LoggingConfig'
                features:
                  $ref: '#/components/schemas/FeaturesConfig'
                custom_config:
                  type: object
                  additionalProperties: true
                deploy:
                  type: boolean
                  description: Whether to immediately deploy settings to Asterisk
                  default: false
      responses:
        '200':
          description: Settings updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  settings:
                    type: object
                    properties:
                      id:
                        type: string
                      version:
                        type: integer
                      last_deployed_at:
                        type: string
                        format: date-time
                        nullable: true
                      deployed_by:
                        type: string
                        nullable: true
                  deployment:
                    type: object
                    nullable: true
        '400':
          description: Bad request - Invalid settings
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin access required
        '500':
          description: Server error - Deployment failed

  /admin/settings/deploy:
    post:
      tags: [Admin - Global Settings]
      summary: Deploy global settings to Asterisk
      description: |
        Deploy the current global settings to Asterisk configuration files and reload modules via AMI.
        
        **Requires admin authentication.**
        
        **Example curl:**
        ```bash
        curl -X POST ${YOUR_SERVER_URL}/api/v1/admin/settings/deploy \
          -H "Authorization: Bearer ADMIN_JWT_TOKEN"
        ```
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Settings deployed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  deployment:
                    type: object
                    properties:
                      pjsip_transport:
                        type: object
                      rtp:
                        type: object
                      sip_global:
                        type: object
                      reload_results:
                        type: array
                        items:
                          type: object
                  settings_version:
                    type: integer
                  deployed_at:
                    type: string
                    format: date-time
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin access required
        '404':
          description: No settings found
        '500':
          description: Deployment failed

