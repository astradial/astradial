    post:
      security:
        - BearerAuth: []
      tags: [Outbound Routes]
      summary: Create new outbound route
      description: |
        Create a new outbound calling route with dial patterns and number manipulation

        **Example curl:**
        ```bash
        curl -X POST ${YOUR_SERVER_URL}/api/v1/outbound-routes \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "name": "US Long Distance",
            "trunk_id": "TRUNK_UUID",
            "dial_pattern": "_1NXXNXXXXXX",
            "strip_digits": 1,
            "caller_id_override": "+15551234567",
            "route_type": "long_distance",
            "priority": 10
          }'
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, trunk_id, dial_pattern]
              properties:
                name:
                  type: string
                  example: "US Long Distance"
                description:
                  type: string
                  example: "Route for US long distance calls"
                trunk_id:
                  type: string
                  format: uuid
                  example: "trunk-uuid-here"
                dial_pattern:
                  type: string
                  example: "_1NXXNXXXXXX"
                  description: "Asterisk dial pattern"
                dial_prefix:
                  type: string
                  example: "1"
                  description: "Prefix to add to dialed number"
                strip_digits:
                  type: integer
                  default: 0
                  example: 1
                  description: "Number of digits to strip from beginning"
                prepend_digits:
                  type: string
                  example: "00"
                  description: "Digits to prepend after stripping"
                caller_id_override:
                  type: string
                  example: "+15551234567"
                  description: "Override outbound caller ID"
                caller_id_name_override:
                  type: string
                  example: "Company Name"
                recording_enabled:
                  type: boolean
                  default: false
                max_channels:
                  type: integer
                  example: 10
                route_type:
                  type: string
                  enum: [emergency, local, long_distance, international, toll_free, custom]
                  default: custom
                priority:
                  type: integer
                  default: 10
                  example: 10
                  description: "Lower number = higher priority"
      responses:
        '201':
          description: Outbound route created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboundRoute'

