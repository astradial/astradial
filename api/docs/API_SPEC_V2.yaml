  /queues/{queueId}/members:
    post:
      security:
        - BearerAuth: []
      tags: [Queues]
      summary: Add member to queue
      description: |
        Add a user as a member to the specified queue. This endpoint automatically
        triggers configuration deployment to ensure the new queue member is
        immediately available in the Asterisk system.

        **Automatic Actions:**
        1. Add queue member to database
        2. Deploy updated configuration to Asterisk
        3. Reload queue configuration in real-time

        **Note:** Configuration deployment happens automatically. No additional
        API calls are needed to make the queue member active.

        **Example curl:**
        ```bash
        curl -X POST ${YOUR_SERVER_URL}/api/v1/queues/QUEUE_UUID/members \
          -H "Authorization: Bearer YOUR_ORG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "user_id": "USER_UUID",
            "penalty": 0
          }'
        ```
      parameters:
        - name: queueId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Queue UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: string
                  format: uuid
                  description: User UUID to add as queue member
                penalty:
                  type: integer
                  default: 0
                  description: Queue member penalty (0 = highest priority)
            example:
              user_id: "bf25246a-9434-4ef1-963f-2ac0fe6dcf9a"
              penalty: 0
      responses:
        '201':
          description: Member added successfully and configuration deployed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  queue_member:
                    $ref: '#/components/schemas/QueueMember'
                  configuration_deployed:
                    type: boolean
                    description: Indicates if Asterisk configuration was automatically deployed
              example:
                success: true
                message: "Queue member added successfully"
                queue_member:
                  id: "uuid-generated"
                  queue_id: "queue-uuid"
                  user_id: "bf25246a-9434-4ef1-963f-2ac0fe6dcf9a"
                  penalty: 0
                  paused: false
                configuration_deployed: true

    delete:
      security:
        - BearerAuth: []
      tags: [Queues]
      summary: Remove member from queue
      description: |
        Remove a user from a queue

        **Example curl:**
        ```bash
        curl -X DELETE "${YOUR_SERVER_URL}/api/v1/queues/QUEUE_UUID/members?userId=USER_UUID" \
          -H "Authorization: Bearer YOUR_ORG_TOKEN"
        ```
      parameters:
        - name: queueId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Member removed

