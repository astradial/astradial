# Nginx configuration for PBX API
# Domain: pbx.talknetics.com
#
# Installation:
# 1. Copy this file to: /etc/nginx/sites-available/pbx.talknetics.com
# 2. Create symlink: sudo ln -s /etc/nginx/sites-available/pbx.talknetics.com /etc/nginx/sites-enabled/
# 3. Update SSL certificate paths below
# 4. Test config: sudo nginx -t
# 5. Reload Nginx: sudo systemctl reload nginx

# HTTP - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name pbx.talknetics.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS - Main configuration
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pbx.talknetics.com;

    # SSL Configuration
    # UPDATE THESE PATHS with your actual SSL certificate locations
    ssl_certificate /etc/letsencrypt/live/pbx.talknetics.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pbx.talknetics.com/privkey.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/pbx.talknetics.com.access.log;
    error_log /var/log/nginx/pbx.talknetics.com.error.log;

    # Max upload size (for recordings, etc.)
    client_max_body_size 100M;

    # API endpoints - Proxy to Node.js backend on port 3000
    location /api/v1/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # Disable buffering for streaming responses
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # OpenAPI spec endpoint
    location /api-spec.json {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers for Swagger UI
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Root path - Redirect to API documentation
    location = / {
        return 301 /api;
    }

    # Swagger UI static assets (match anywhere in path)
    location ~ /(swagger-ui-bundle\.js|swagger-ui-standalone-preset\.js|swagger-ui-init\.js|swagger-ui\.css|favicon-32x32\.png|favicon-16x16\.png)$ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger UI and API documentation pages (with and without trailing slash)
    location ~ ^/(api|docs|api-docs)/?$ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deny all other paths - API endpoints are already handled above
    location / {
        return 404;
    }
}
